name: Weekly LeetCode Summary

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weekly Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add user_goals.json user_progress.json
          
          if git diff --cached --quiet; then
            echo "No changes detected in user_goals.json or user_progress.json"
          else
            git commit -m "Update user goals and progress [skip ci]"
            git push
            echo "✅ Successfully pushed updated JSON files"
          fi